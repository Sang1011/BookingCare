version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: bookingcare_postgres
    environment:
      POSTGRES_DB: BookingCareDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: BookingCare123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bookingcare_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: