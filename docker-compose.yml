version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: bookingcare_postgres
    environment:
      POSTGRES_DB: BookingCareDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: BookingCare123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bookingcare_redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: bookingcare_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: BookingCare
      RABBITMQ_DEFAULT_PASS: BookingCare123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api:
    build:
      context: .
      dockerfile: src/BookingCare.Api/Dockerfile
    container_name: bookingcare_api
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS}
      - ConnectionStrings__DefaultConnection=Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=${REDIS_CONNECTION}
      - RabbitMQ__Host=${RABBITMQ_HOST}
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - Frontend__BaseUrl=${FRONTEND_BASE_URL}
    ports:
      - "5273:8080"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: src/BookingCare.Worker/Dockerfile
    container_name: bookingcare_worker
    environment:
      - DOTNET_ENVIRONMENT=${DOTNET_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - RabbitMQ__Host=${RABBITMQ_HOST}
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - EmailSettings__Host=${EMAIL_HOST}
      - EmailSettings__Port=${EMAIL_PORT}
      - EmailSettings__Username=${EMAIL_USERNAME}
      - EmailSettings__Password=${EMAIL_PASSWORD}
      - EmailSettings__FromEmail=${EMAIL_FROM_EMAIL}
      - EmailSettings__FromName=${EMAIL_FROM_NAME}
      - ApiBaseUrl=${API_BASE_URL}
    depends_on:
      - postgres
      - rabbitmq
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data: